<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Gestión de Usuarios</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css" />

</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="container-fluid px-4">
      <div class="d-flex align-items-center justify-content-between py-3">
        <div class="d-flex align-items-center gap-3">
          <div class="header-logo">
            <span class="logo-icon">⬡</span>
          </div>
          <div>
            <h1 class="header-title mb-0">Bienvenidos</h1>
            <p class="header-subtitle mb-0">Sistema de Gestión de Usuarios</p>
          </div>
        </div>
        <div class="header-badge">
          <span id="total-badge">0 usuarios registrados</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <main class="container-fluid px-4 py-4">
    <div class="row g-4">

      <!-- ===== COLUMNA IZQUIERDA: Formulario + Estadísticas ===== -->
      <div class="col-lg-4">

        <!-- Tarjeta Formulario -->
        <div class="card-panel mb-4">
          <div class="card-panel-header">
            <span class="card-panel-icon">✦</span>
            <h2 class="card-panel-title">Nuevo Usuario</h2>
          </div>
          <div class="card-panel-body">

            <div class="mb-3">
              <label for="input-nombre" class="form-label-custom">Nombre completo</label>
              <input type="text" id="input-nombre" class="input-custom" placeholder="Ej: Ana González" maxlength="50"/>
              <span class="error-msg" id="error-nombre"></span>
            </div>

            <div class="mb-3">
              <label for="input-edad" class="form-label-custom">Edad</label>
              <input type="number" id="input-edad" class="input-custom" placeholder="Ej: 28" min="1" max="120"/>
              <span class="error-msg" id="error-edad"></span>
            </div>

            <div class="mb-4">
              <label for="select-rol" class="form-label-custom">Rol</label>
              <select id="select-rol" class="input-custom">
                <option value="">— Selecciona un rol —</option>
                <option value="Administrador">Administrador</option>
                <option value="Usuario">Usuario</option>
              </select>
              <span class="error-msg" id="error-rol"></span>
            </div>

            <button id="btn-agregar" class="btn-primary-custom w-100" onclick="agregarUsuario()">
              <span>+ Agregar Usuario</span>
            </button>

          </div>
        </div>

        <!-- Tarjeta Estadísticas -->
        <div class="card-panel">
          <div class="card-panel-header">
            <span class="card-panel-icon">◈</span>
            <h2 class="card-panel-title">Estadísticas</h2>
          </div>
          <div class="card-panel-body">
            <div class="stats-grid">
              <div class="stat-item stat-activos">
                <span class="stat-number" id="count-activos">0</span>
                <span class="stat-label">Activos</span>
              </div>
              <div class="stat-item stat-inactivos">
                <span class="stat-number" id="count-inactivos">0</span>
                <span class="stat-label">Inactivos</span>
              </div>
              <div class="stat-item stat-admins">
                <span class="stat-number" id="count-admins">0</span>
                <span class="stat-label">Admins</span>
              </div>
              <div class="stat-item stat-total">
                <span class="stat-number" id="count-total">0</span>
                <span class="stat-label">Total</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- ===== COLUMNA DERECHA: Tabla ===== -->
      <div class="col-lg-8">
        <div class="card-panel h-100">

          <!-- Encabezado de la tabla con controles -->
          <div class="card-panel-header flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
              <span class="card-panel-icon">▦</span>
              <h2 class="card-panel-title">Usuarios Registrados</h2>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap">

              <!-- Filtro por rol -->
              <select id="filtro-rol" class="input-custom input-sm" onchange="renderizar()">
                <option value="todos">Todos</option>
                <option value="Administrador">Administradores</option>
                <option value="Usuario">Usuarios</option>
              </select>

              <!-- Ordenar por edad -->
              <button class="btn-secondary-custom" onclick="ordenarPorEdad()" id="btn-ordenar">
                ↕ Edad
              </button>

            </div>
          </div>

          <!-- Tabla -->
          <div class="card-panel-body p-0">
            <div class="table-wrapper">
              <table class="tabla-usuarios">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tabla-body">
                  <!-- Filas generadas por JS -->
                </tbody>
              </table>
            </div>

            <!-- Estado vacío -->
            <div id="empty-state" class="empty-state">
              <p class="empty-icon">◌</p>
              <p class="empty-text">No hay usuarios para mostrar.</p>
              <p class="empty-sub">Agrega el primero usando el formulario.</p>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast de notificación -->
  <div id="toast" class="toast-custom" role="alert"></div>

  <!-- Script principal -->
  <script src="script.js"></script>

</body>
</html>
